run:
  generations: 1
 
plugins:
  target_type: rest.RestGenerator
  target_name: personal-assistant
  probe_spec: agent_breaker.AgentBreaker
  extended_detectors:
    - agent_breaker.AgentBreakerResult
  generators:
    rest:
      RestGenerator:
        uri: http://localhost:8000/v1/chat/completions
        headers:
          Content-Type: application/json
        req_template_json_object:
          model: garak
          messages:
            - role: user
              content: $INPUT
        response_json: true
        response_json_field: "$.choices[0].message.content"
        request_timeout: 240
        max_tokens: 4096
  probes:
    agent_breaker:
      AgentBreaker:
        agent_config_file: agent_breaker/iron_swarm_agent.yaml
        max_attempts_per_tool: 1
        red_team_model_type: "nim.NVOpenAIChat"
        red_team_model_name: "aws/anthropic/claude-opus-4-5"
        red_team_model_config:
          uri: "https://inference-api.nvidia.com/v1/"
          max_tokens: 8192
          suppressed_params:
            - stop
            - top_p
            - frequency_penalty
            - presence_penalty
            - seed
  detectors:
    agent_breaker:
      AgentBreakerResult:
        detector_model_type: "nim"
        detector_model_name: "aws/anthropic/claude-opus-4-5"
        detector_model_config:
          uri: "https://inference-api.nvidia.com/v1/"
          max_tokens: 1024
          suppressed_params:
            - stop
            - top_p
            - frequency_penalty
            - presence_penalty
            - seed
